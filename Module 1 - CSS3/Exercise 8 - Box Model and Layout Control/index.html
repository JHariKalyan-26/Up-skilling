<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model and Layout Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Community Event Portal</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live performances and entertainment.</p>
    </div>

    <form>
        <input type="text"
               placeholder="Enter your name"
               class="highlightField">
    </form>

    <div class="hiddenBox">
        visibility: hidden example
    </div>

    <div class="noneBox">
        display: none example
    </div>

</body>
</html>
