<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation and Linking</title>
</head>
<body>

    <h1>Community Event Portal</h1>

    <!-- Navigation Bar -->
    <nav>
        <a href="#home">Home</a> |
        <a href="#events">Events</a> |
        <a href="#contact">Contact</a> |
        <a href="https://www.cognizant.com" target="_blank">Cognizant</a>
    </nav>

    <hr>

    <!-- Internal Links using Section IDs -->
    <section id="home">
        <h2>Home</h2>
        <p>Welcome to the Community Event Portal.</p>
    </section>

    <section id="events">
        <h2>Events</h2>
        <p>Upcoming events will be displayed here.</p>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p>Email: community@event.com</p>
    </section>

</body>
</html>
