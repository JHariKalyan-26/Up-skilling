<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <style>
        .event-image {
            border: 2px solid black;
            width: 200px;
            height: 150px;
        }

        table {
            margin: auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 align="center">Community Event Gallery</h1>

    <table>
        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Music Event"
                     title="Music Event"
                     class="event-image">
                <br>
                Music Event
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Food Festival"
                     title="Food Festival"
                     class="event-image">
                <br>
                Food Festival
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Sports Event"
                     title="Sports Event"
                     class="event-image">
                <br>
                Sports Event
            </td>
        </tr>

        <tr>
            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Cultural Program"
                     title="Cultural Program"
                     class="event-image">
                <br>
                Cultural Program
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Community Meeting"
                     title="Community Meeting"
                     class="event-image">
                <br>
                Community Meeting
            </td>

            <td>
                <img src="https://via.placeholder.com/200x150"
                     alt="Charity Event"
                     title="Charity Event"
                     class="event-image">
                <br>
                Charity Event
            </td>
        </tr>
    </table>

</body>
</html>
