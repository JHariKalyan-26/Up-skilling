<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saving User Preferences</title>
</head>
<body>

    <h1>Event Preference Selection</h1>

    <label>Select Event Type:</label>

    <select id="eventType">
        <option value="">Select Event</option>
        <option value="Music Event">Music Event</option>
        <option value="Sports Event">Sports Event</option>
        <option value="Food Festival">Food Festival</option>
    </select>

    <br><br>

    <button onclick="savePreference()">
        Save Preference
    </button>

    <button onclick="clearPreference()">
        Clear Preferences
    </button>

    <p id="message"></p>

    <script>

        window.onload = function () {

            let savedEvent =
                localStorage.getItem("preferredEvent");

            if (savedEvent) {
                document.getElementById("eventType").value =
                    savedEvent;

                document.getElementById("message").innerHTML =
                    "Saved Preference: " + savedEvent;
            }
        };

        function savePreference() {

            let eventType =
                document.getElementById("eventType").value;

            localStorage.setItem(
                "preferredEvent",
                eventType
            );

            sessionStorage.setItem(
                "currentSessionEvent",
                eventType
            );

            document.getElementById("message").innerHTML =
                "Preference Saved Successfully!";
        }

        function clearPreference() {

            localStorage.clear();
            sessionStorage.clear();

            document.getElementById("message").innerHTML =
                "Preferences Cleared!";
        }

    </script>

</body>
</html>
