<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>
</head>
<body onbeforeunload="return warnUser()">

    <h1>Community Event Promo Video</h1>

    <video width="400" controls oncanplay="videoReady()">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <p id="message"></p>

    <form>
        <label>Your Name:</label>
        <input type="text" placeholder="Enter your name">
    </form>

    <script>
        function videoReady() {
            document.getElementById("message").innerHTML =
                "Video ready to play";
        }

        function warnUser() {
            return "You have unfinished form data. Are you sure you want to leave?";
        }
    </script>

</body>
</html>
