<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Layouts and Grid Classes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Bootstrap Column Layouts</h1>

    <div class="row mb-4">
        <div class="col-md-3 bg-dark text-white p-3">
            Sidebar
        </div>

        <div class="col-md-9 bg-light p-3">
            Main Content Area
        </div>
    </div>

    <div class="row text-center">
        <div class="col-sm-3 bg-primary text-white p-3">Column 1</div>
        <div class="col-sm-3 bg-success text-white p-3">Column 2</div>
        <div class="col-sm-3 bg-warning text-dark p-3">Column 3</div>
        <div class="col-sm-3 bg-danger text-white p-3">Column 4</div>
    </div>

</div>

</body>
</html>
