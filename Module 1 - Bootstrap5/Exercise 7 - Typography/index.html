<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="display-1">
        Community Event Portal
    </h1>

    <p class="lead">
        Welcome to the Bootstrap Typography Exercise.
    </p>

    <p class="text-muted">
        This is muted text.
    </p>

    <p class="fw-bold">
        This text is bold.
    </p>

    <p class="text-uppercase">
        community events
    </p>

    <p class="text-lowercase">
        COMMUNITY EVENTS
    </p>

    <p class="text-capitalize">
        welcome to bootstrap typography
    </p>

</div>

</body>
</html>
