<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alignment and Reordering in Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Alignment and Reordering Demo
    </h1>

    <!-- Alignment Example -->

    <div class="row justify-content-center align-items-center bg-light"
         style="height:200px;">

        <div class="col-4 bg-primary text-white text-center p-3">
            Centered Content
        </div>

    </div>

    <hr>

    <!-- Reordering Example -->

    <div class="row mt-4">

        <div class="col-md-6 order-md-2 bg-success text-white p-3">
            Column 1 (Displayed Second on Desktop)
        </div>

        <div class="col-md-6 order-md-1 bg-warning text-dark p-3">
            Column 2 (Displayed First on Desktop)
        </div>

    </div>

</div>

</body>
</html>
